<!DOCTYPE html>
<html lang="en">
<head>

        /* CSS for styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .about {

        }
        .social-icons {

        }

            margin: 0 10px;

        .social-icons img {
            width: 40px; /* Adjust icon size as needed */
            height: 40px;
        }

        <h1>About Me</h1>

        </div>
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/yourprofile" target="_blank"><img src="linkedin_icon.png" alt="LinkedIn"></a>
            <a href="https://github.com/yourusername" target="_blank"><img src="github_icon.png" alt="GitHub"></a>

</html>
