<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Landing Page</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    /* Body styles */
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
    }
    
    /* Container styles */
    .container {
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    
    /* Heading styles */
    h1 {
        text-align: center;
        margin-bottom: 20px;
    }
    
    /* Button styles */
    .button {
        display: inline-block;
        padding: 10px 20px;
        background-color: #007bff;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }
    
    .button:hover {
        background-color: #0056b3;
}
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Resume</h1>
        <p>Thank you for visiting my landing page. You can download my resume by clicking the button below.</p>
        <p><a href="path/to/your/resume.pdf" class="button" download>Download Resume</a></p>
    </div>
</body>
</html>
